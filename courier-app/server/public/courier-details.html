<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Курьер — CourierTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="topbar">
    <div class="topbar-brand">
      <a href="/" style="display:flex;align-items:center;gap:10px;">
        <span class="dot"></span>
        <span>CourierTrack</span>
      </a>
    </div>
    <div class="topbar-actions">
      <a href="/" class="btn btn-ghost">← Назад к списку</a>
    </div>
  </div>

  <div class="page">
    <div id="courierHeader"></div>
    <div class="map-section" style="margin-top: 24px;">
      <div id="routeMap" style="height: 460px;"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const id = window.location.pathname.split('/')[3];

    async function loadCourier() {
      const res = await fetch(`/api/couriers/${id}`);
      if (!res.ok) {
        document.getElementById('courierHeader').innerHTML = '<p>Курьер не найден.</p>';
        return;
      }
      const { courier } = await res.json();

      document.getElementById('courierHeader').innerHTML = `
        <div class="page-header">
          <div>
            <h1 class="page-title">${courier.full_name}</h1>
            <p class="page-subtitle">${courier.instagram_username ? '@' + courier.instagram_username : ''} · ${courier.status === 'online' ? 'На смене' : 'Не в сети'}</p>
          </div>
        </div>
      `;

      loadRoute(courier);
    }

    async function loadRoute(courier) {
      const res = await fetch(`/api/couriers/${id}/locations?limit=200`);
      const { locations } = await res.json();

      const map = L.map('routeMap');
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
      }).addTo(map);

      if (locations.length === 0) {
        map.setView([55.7558, 37.6173], 11);
        L.popup()
          .setLatLng([55.7558, 37.6173])
          .setContent('Пока нет данных о местоположении этого курьера.')
          .openOn(map);
        return;
      }

      const latlngs = locations
        .slice()
        .reverse()
        .map((l) => [l.latitude, l.longitude]);

      L.polyline(latlngs, { color: '#ff7a33', weight: 3 }).addTo(map);
      L.marker(latlngs[latlngs.length - 1]).addTo(map).bindPopup('Последняя известная точка').openPopup();

      map.fitBounds(latlngs, { padding: [40, 40] });
    }

    loadCourier();
  </script>
</body>
</html>
